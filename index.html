<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>初予營運POS</title>
<style>
/* ════════════════════════════════════
   設計系統
════════════════════════════════════ */
:root{
  --cream:#FDF8F3;--milk:#F5EBDD;--latte:#E8D5BA;
  --caramel:#D4A574;--mocha:#A67B5B;--espresso:#5C4033;
  --ink:#3D2E22;--muted:#8B7355;--border:#EDE0D4;
  --rose:#F5C6BD;--sage:#B8CDB8;--gold:#E8C285;
  --lavender:#D5CDE8;--danger:#D87470;--success:#87B884;
  --sidebar-w:240px;
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;min-height:100vh}
button,input,select,textarea{font-family:inherit;font-size:inherit}
button{border:none;cursor:pointer;background:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--caramel)!important}
.tap{transition:transform .1s;cursor:pointer}.tap:active{transform:scale(0.97)}
.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.anim-slide{animation:slideUp .3s ease-out both}
.anim-fade{animation:fadeIn .25s ease-out both}
.anim-pop{animation:pop .4s cubic-bezier(0.18,1.25,0.4,1) both}

/* ════════════════════════════════════
   登入頁
════════════════════════════════════ */
#login-view{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--espresso),var(--mocha));
}
.login-card{
  background:white;border-radius:28px;padding:40px;
  width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.15);
}
.login-logo{font-size:48px;text-align:center;margin-bottom:8px}
.login-title{font-size:24px;font-weight:800;text-align:center;color:var(--ink);margin-bottom:4px}
.login-sub{font-size:13px;text-align:center;color:var(--muted);margin-bottom:32px}
.field{margin-bottom:18px}
.field-label{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;color:var(--ink);background:white}
.btn-group-grid{display:grid;gap:8px}
.btn-option{padding:12px;border-radius:12px;background:white;color:var(--ink);font-weight:600;font-size:14px;border:1.5px solid var(--border)}
.btn-option.selected{background:var(--caramel);color:white;border-color:var(--caramel)}
.btn-primary-full{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--caramel),var(--mocha));color:white;font-size:16px;font-weight:700;box-shadow:0 8px 24px rgba(166,123,91,.3)}
.btn-secondary-full{width:100%;padding:14px;border-radius:14px;background:white;color:var(--mocha);font-size:14px;font-weight:600;border:1.5px solid var(--border)}
.btn-danger-full{width:100%;padding:14px;border-radius:14px;background:white;color:var(--danger);font-size:14px;font-weight:600;border:1.5px solid var(--danger)}

/* ════════════════════════════════════
   前台 App (員工 + 老闆App模式)
════════════════════════════════════ */
#app-view{
  display:none;background:linear-gradient(180deg,#F0E4D3 0%,#E8D5BA 100%);
  min-height:100vh;padding:20px 0;justify-content:center;
}
#app-view.active{display:flex}
#app-frame{
  width:100%;max-width:430px;min-height:calc(100vh - 40px);
  background:var(--cream);border-radius:32px;
  box-shadow:0 30px 80px rgba(92,64,51,.18);
  overflow:hidden;display:flex;flex-direction:column;position:relative
}
@media(max-width:480px){
  #app-view{padding:0;background:var(--cream)}
  #app-frame{max-width:100%;min-height:100vh;border-radius:0;box-shadow:none}
}
/* App 共用 UI */
.app-header{padding:20px 20px 12px;display:flex;align-items:center;gap:12px;background:var(--cream);position:sticky;top:0;z-index:10}
.app-header h1{flex:1;font-size:20px;font-weight:700;color:var(--ink)}
.icon-btn{width:40px;height:40px;border-radius:14px;background:var(--milk);color:var(--espresso);display:grid;place-items:center}
.icon-btn-primary{background:var(--caramel);color:white}
.scroll-area{flex:1;overflow-y:auto;padding:0 20px 130px}
.card{background:white;border-radius:20px;padding:18px;box-shadow:0 2px 10px rgba(166,123,91,.06);margin-bottom:12px}
.tag{display:inline-block;padding:3px 10px;border-radius:999px;background:var(--latte);color:var(--espresso);font-size:11px;font-weight:600}
.tag-vip{background:var(--rose);color:#8B3A2E}.tag-old{background:var(--gold);color:#7A5A1F}.tag-new{background:var(--milk);color:var(--mocha)}
.app-input{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);background:white;font-size:15px;color:var(--ink)}
.app-btn-primary{width:100%;padding:18px;border-radius:18px;background:linear-gradient(135deg,var(--caramel),var(--mocha));color:white;font-size:16px;font-weight:700;box-shadow:0 10px 24px rgba(166,123,91,.3)}
.app-btn-secondary{width:100%;padding:14px;border-radius:14px;background:white;color:var(--mocha);font-size:14px;font-weight:600;border:1.5px solid var(--border)}
.app-btn-danger{width:100%;padding:14px;border-radius:14px;background:white;color:var(--danger);font-size:14px;font-weight:600;border:1.5px solid var(--danger)}
.progress-bar{display:flex;gap:8px;padding:0 24px 16px}
.progress-bar>div{flex:1;height:5px;border-radius:999px;background:var(--border);transition:background .3s}
.progress-bar>div.active{background:var(--caramel)}
.avatar{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--milk),var(--latte));display:grid;place-items:center;color:var(--mocha);font-weight:700;font-size:18px;flex-shrink:0}
.avatar-lg{width:80px;height:80px;border-radius:28px;background:linear-gradient(135deg,var(--caramel),var(--mocha));color:white;font-size:32px;display:grid;place-items:center}
.btn-group-grid{display:grid;gap:8px}
.btn-option-app{padding:12px;border-radius:12px;background:white;color:var(--ink);font-weight:600;font-size:14px;border:1.5px solid var(--border)}
.btn-option-app.selected{background:var(--caramel);color:white;border-color:var(--caramel)}
.date-picker{display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px}
.date-pick-item{min-width:60px;padding:12px 8px;border-radius:16px;background:white;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.04);cursor:pointer}
.date-pick-item.active{background:linear-gradient(135deg,var(--caramel),var(--mocha));color:white}
.big-btn{background:white;border-radius:24px;padding:22px 18px;box-shadow:0 2px 10px rgba(166,123,91,.06);display:flex;flex-direction:column;gap:12px;min-height:110px;color:var(--espresso);cursor:pointer}
.big-btn-icon{width:44px;height:44px;border-radius:14px;display:grid;place-items:center}
.big-btn-label{font-size:15px;font-weight:700;margin-bottom:2px}
.big-btn-sub{font-size:12px;opacity:.7}
.bottom-nav{position:sticky;bottom:0;z-index:50;background:white;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 0 max(14px,env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(92,64,51,.07)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;border:none;background:none;cursor:pointer;color:var(--muted);transition:color .15s}
.nav-btn.active{color:var(--caramel)}
.nav-btn span{font-size:10px;font-weight:600}
.nav-center{background:linear-gradient(135deg,var(--caramel),var(--mocha));border-radius:20px;color:white;margin-top:-14px;width:56px;height:56px;place-self:center;display:grid;place-items:center;box-shadow:0 6px 20px rgba(166,123,91,.35);border:none;cursor:pointer;transition:transform .1s}
.nav-center:active{transform:scale(.93)}
.mg-high{color:#4A8C4A;font-weight:700}.mg-mid{color:#C07820;font-weight:700}.mg-low{color:var(--danger);font-weight:700}
.visit-warn{background:#FEF3CD;color:#856404;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600;display:inline-block;margin-top:4px}
.visit-red{background:#FDDEDE;color:#8C2020}
.app-modal-overlay{position:fixed;inset:0;background:rgba(60,40,30,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.app-modal{background:white;border-radius:24px;padding:24px;width:100%;max-width:360px}
.app-modal h3{color:var(--ink);margin-bottom:12px;font-size:18px}
.app-modal p{color:var(--muted);margin-bottom:20px;font-size:14px}
.app-modal-actions{display:flex;gap:10px}
.app-modal-actions button{flex:1;padding:12px;border-radius:12px;font-weight:600}

/* ════════════════════════════════════
   後台管理 (老闆後台模式)
════════════════════════════════════ */
#admin-view{display:none;min-height:100vh;background:var(--milk)}
#admin-view.active{display:flex}
.sidebar{width:var(--sidebar-w);background:var(--espresso);color:white;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo-title{font-size:18px;font-weight:800;margin-top:4px}
.sidebar-logo-sub{font-size:11px;opacity:.6;margin-top:2px}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;color:rgba(255,255,255,.7);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:4px}
.nav-item:hover{background:rgba(255,255,255,.08);color:white}
.nav-item.active{background:var(--caramel);color:white}
.nav-item svg{flex-shrink:0}
.sidebar-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-user-name{font-weight:700;font-size:14px}
.sidebar-user-role{font-size:11px;opacity:.7}
.topbar{background:white;border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.topbar h1{flex:1;font-size:22px;font-weight:800;color:var(--ink)}
@media(max-width:768px){.topbar{padding:14px 16px}}
.content{padding:28px 32px;flex:1}
@media(max-width:768px){.content{padding:20px 16px}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px}
.kpi-card{background:white;border-radius:20px;padding:22px;box-shadow:0 2px 10px rgba(166,123,91,.06)}
.kpi-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px}
.kpi-value{font-size:30px;font-weight:800;color:var(--ink)}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px}
.kpi-card-dark{background:linear-gradient(135deg,var(--espresso),var(--mocha));color:white}
.kpi-card-dark .kpi-label,.kpi-card-dark .kpi-sub{color:rgba(255,255,255,.75)}
.kpi-card-dark .kpi-value{color:white}
.table-wrap{background:white;border-radius:20px;box-shadow:0 2px 10px rgba(166,123,91,.06);overflow:hidden}
.table-head{padding:20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.table-head h2{flex:1;font-size:16px;font-weight:700;color:var(--ink)}
table{width:100%;border-collapse:collapse}
th{background:var(--milk);padding:12px 16px;text-align:left;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;color:var(--ink)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream)}
.tbl-scroll{overflow-x:auto}
.admin-tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.admin-tag-vip{background:var(--rose);color:#8B3A2E}
.admin-tag-old{background:var(--gold);color:#7A5A1F}
.admin-tag-new{background:var(--milk);color:var(--mocha)}
.admin-tag-done{background:var(--sage);color:#2D5A2D}
.admin-tag-cancel{background:#FFE5E5;color:var(--danger)}
.form-card{background:white;border-radius:20px;padding:28px;box-shadow:0 2px 10px rgba(166,123,91,.06);max-width:560px}
.admin-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;color:var(--ink);background:white}
.admin-btn-group{display:flex;gap:8px;flex-wrap:wrap}
.admin-btn-option{padding:10px 16px;border-radius:10px;background:white;color:var(--ink);font-weight:600;font-size:13px;border:1.5px solid var(--border);cursor:pointer}
.admin-btn-option.selected{background:var(--caramel);color:white;border-color:var(--caramel)}
.btn-primary{padding:14px 24px;border-radius:12px;background:linear-gradient(135deg,var(--caramel),var(--mocha));color:white;font-size:15px;font-weight:700;box-shadow:0 6px 16px rgba(166,123,91,.25);cursor:pointer;border:none}
.btn-secondary{padding:12px 20px;border-radius:12px;background:white;color:var(--mocha);font-size:14px;font-weight:600;border:1.5px solid var(--border);cursor:pointer}
.btn-danger{padding:12px 20px;border-radius:12px;background:white;color:var(--danger);font-size:14px;font-weight:600;border:1.5px solid var(--danger);cursor:pointer}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600}
.margin-high{color:#4A8C4A;font-weight:700}.margin-mid{color:#C07820;font-weight:700}.margin-low{color:var(--danger);font-weight:700}
.bar-wrap{display:flex;align-items:flex-end;gap:6px;height:160px;padding:0 8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{width:100%;border-radius:6px;background:var(--latte);transition:height .6s}
.bar-today{background:linear-gradient(180deg,var(--caramel),var(--mocha))}
.bar-label{font-size:10px;color:var(--muted)}
.bar-val{font-size:10px;color:var(--muted);height:14px}
.visit-warn-red{display:inline-block;background:#FEE2E2;color:#B91C1C;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.visit-warn-orange{display:inline-block;background:#FEF3CD;color:#92400E;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
@media(max-width:768px){.hamburger{display:flex;flex-direction:column;gap:5px}.hamburger span{display:block;width:22px;height:2px;background:var(--ink);border-radius:2px}}
.overlay-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.overlay-mask.show{display:block}

/* ════════════════════════════════════
   共用 Modal & Toast
════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(60,40,30,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:white;border-radius:24px;padding:28px;width:100%;max-width:420px}
.modal h3{color:var(--ink);margin-bottom:12px;font-size:20px}
.modal p{color:var(--muted);margin-bottom:20px;font-size:14px}
.modal-actions{display:flex;gap:10px}
.modal-actions button{flex:1;padding:12px;border-radius:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:28px;right:28px;background:var(--espresso);color:white;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .25s;z-index:9999;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
@media(max-width:480px){#toast{bottom:90px;right:auto;left:50%;transform:translateX(-50%) translateY(10px)}#toast.show{transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- ══════════════════════════ 登入 ══════════════════════════ -->
<div id="login-view">
  <div class="login-card anim-fade">
    <div class="login-logo">🌸</div>
    <div class="login-title">初予營運POS</div>
    <div class="login-sub">收費管理系統</div>
    <div class="field">
      <div class="field-label">身份</div>
      <div class="btn-group-grid" style="grid-template-columns:1fr 1fr" id="roleGroup">
        <button class="btn-option selected tap" onclick="setRole('admin',this)">👑 老闆</button>
        <button class="btn-option tap" onclick="setRole('staff',this)">💆 員工</button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">姓名</div>
      <input class="input" id="loginName" placeholder="輸入你的名字"/>
    </div>
    <div class="field" style="margin-bottom:24px">
      <div class="field-label">密碼</div>
      <input class="input" id="loginPwd" type="password" placeholder="請輸入密碼"/>
    </div>
    <button class="btn-primary-full tap" onclick="doLogin()">登入系統</button>
    
  </div>
</div>

<!-- ══════════════════════════ 前台 App ══════════════════════════ -->
<div id="app-view">
  <div id="app-frame">
    <div id="app-content"></div>
    <div id="app-bottom-nav"></div>
    <div id="app-modal-area"></div>
  </div>
</div>

<!-- ══════════════════════════ 後台管理 ══════════════════════════ -->
<div id="admin-view">
  <div class="sidebar" id="adminSidebar">
    <div class="sidebar-logo">
      <div style="font-size:28px">🌸</div>
      <div class="sidebar-logo-title">初予營運POS</div>
      <div class="sidebar-logo-sub" id="adminSidebarSub">後台管理系統</div>
    </div>
    <nav class="sidebar-nav" id="adminNav"></nav>
    <div class="sidebar-user">
      <div style="display:flex;align-items:center;gap:10px">
        <div id="adminUserAvatar" style="width:36px;height:36px;border-radius:12px;background:var(--caramel);display:grid;place-items:center;color:white;font-weight:700">A</div>
        <div>
          <div class="sidebar-user-name" id="adminUserName">Amy</div>
          <div class="sidebar-user-role" id="adminUserRole">老闆</div>
        </div>
      </div>
      <button onclick="switchToApp()" style="margin-top:10px;width:100%;padding:10px;border-radius:10px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px">
        📱 切換前台模式
      </button>
      <button onclick="doLogout()" style="margin-top:8px;width:100%;padding:10px;border-radius:10px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:13px;font-weight:600">登出</button>
    </div>
  </div>
  <div class="main" id="adminMain"></div>
</div>

<div id="toast"></div>
<div class="overlay-mask" id="overlay" onclick="closeSidebar()"></div>
<div id="global-modal"></div>

<script>
window.onerror=function(msg,src,line,col,err){console.error('JS Error:',msg,'line:',line);return false};
/* ════════════════════════════════════
   資料層 - 共用 localStorage KEY
════════════════════════════════════ */
const KEY={customers:'bs_cu',services:'bs_sv',transactions:'bs_tx',appointments:'bs_ap',wallets:'bs_wl',user:'bs_us',staff:'bs_staff'};
const load=(k,fb)=>{try{const d=localStorage.getItem(k);return d?JSON.parse(d):fb}catch{return fb}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36);
const today=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const thisMonth=()=>today().slice(0,7);
const fm=n=>`$${Math.round(n||0).toLocaleString()}`;
const pct=n=>`${(n||0).toFixed(1)}%`;
const fmDate=d=>{if(!d)return'-';const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const daysSince=d=>{if(!d)return -1;return Math.floor((new Date()-new Date(d))/86400000)};
const calcLevel=(spent,visits)=>{if(!visits||visits===0)return'新客';if((spent||0)>=30000)return'VIP';if((spent||0)>=3000)return'舊客';return'新客'};

function exportCSV(type){
  let rows=[],filename='';
  if(type==='transactions'){
    filename='消費紀錄.csv';
    rows=[['日期','客戶','療程','原價','實收','成本','毛利','毛利率','付款','狀態','員工']];
    D.transactions.forEach(t=>{const p=t.paid-(t.cost||0),mg=t.paid>0?(p/t.paid*100).toFixed(1)+'%':'0%';rows.push([t.date,t.cname,t.sname,t.orig,t.paid,t.cost||0,p,mg,t.pm,t.status,t.staff||''])});
  }else if(type==='customers'){
    filename='客戶資料.csv';
    rows=[['姓名','電話','LINE ID','生日','膚質','等級','累積消費','來店次數','最後到訪','備註']];
    D.customers.forEach(c=>rows.push([c.name,c.phone,c.lineId||'',c.birthday||'',c.skinType||'',c.level,c.totalSpent||0,c.visits||0,c.lastVisit||'',c.notes||'']));
  }else if(type==='services'){
    filename='療程資料.csv';
    rows=[['名稱','分類','售價','成本','毛利','毛利率','狀態']];
    D.services.forEach(s=>{const p=s.price-s.cost,mg=s.price>0?(p/s.price*100).toFixed(1)+'%':'0%';rows.push([s.name,s.category,s.price,s.cost,p,mg,s.active?'啟用':'停用'])});
  }
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  toast('✅ 已匯出 '+filename);
}
window.exportCSV=exportCSV;

  if(p.pm==='轉帳'&&(!p.pmNote||p.pmNote.trim().length<3)){toast('⚠️ 請輸入轉帳末五碼');return}
  if(p.pm==='刷卡'&&(!p.pmNote||p.pmNote.trim().length<3)){toast('⚠️ 請輸入卡號末四碼');return}
  const pmLabel=p.pm+(p.pmNote?`（${p.pmNote.trim()}）`:'');
  const tx={id:uid(),cid:p.cust.id,cname:p.cust.name,sid:p.svc.id,sname:p.svc.name,orig:p.svc.price,paid:parseInt(p.paid)||0,cost:p.svc.cost||0,pm:pmLabel,status:'完成',date:today(),staff:p.staffName||D.user.name};

};

/* ─── 毛利報表 ─── */
function rReports(){
  if(D.user.role!=='admin')return`<div class="app-header"><button class="icon-btn tap" onclick="go('dashboard')">${Iapp.back()}</button><h1>毛利報表</h1></div><div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:48px;margin-bottom:16px">🔒</div><p>此功能僅老闆可使用</p><button class="app-btn-secondary tap" style="margin-top:16px" onclick="go('dashboard')">返回首頁</button></div>`;

  const mRev=mTx.reduce((s,t)=>s+t.paid,0),mCost=mTx.reduce((s,t)=>s+(t.cost||0),0);
  const mProfit=mRev-mCost,mMg=mRev>0?mProfit/mRev*100:0;
  const days7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const rev=D.transactions.filter(t=>t.date===ds&&t.status==='完成').reduce((s,t)=>s+t.paid,0);return{ds,rev,lbl:['日','一','二','三','四','五','六'][d.getDay()]}});
  const maxRev=Math.max(...days7.map(d=>d.rev),1);
  const svcMap={};mTx.forEach(t=>{if(!svcMap[t.sname])svcMap[t.sname]={name:t.sname,count:0,rev:0,profit:0};svcMap[t.sname].count++;svcMap[t.sname].rev+=t.paid;svcMap[t.sname].profit+=(t.paid-(t.cost||0))});
  const top5=Object.values(svcMap).sort((a,b)=>b.profit-a.profit).slice(0,5);
  const pmMap={};mTx.forEach(t=>{pmMap[t.pm]=(pmMap[t.pm]||0)+t.paid});
  const vip=D.customers.filter(c=>c.level==='VIP').length,old=D.customers.filter(c=>c.level==='舊客').length,nw=D.customers.filter(c=>c.level==='新客').length;
  const mCids=[...new Set(mTx.map(t=>t.cid))];let newIn=0,retIn=0;mCids.forEach(cid=>{const c=D.customers.find(x=>x.id===cid);if(!c)return;const ct=mTx.filter(t=>t.cid===cid).length;if((c.visits||0)<=ct)newIn++;else retIn++});
  return `<div class="app-header"><button class="icon-btn tap" onclick="go('dashboard')">${Iapp.back()}</button><h1>毛利報表</h1>
    <button class="icon-btn tap" onclick="exportCSV('transactions')" title="匯出CSV">${Iapp.download()}</button>
  </div>
  <div class="scroll-area no-scrollbar">
    <div style="margin-bottom:14px"><input type="month" class="app-input" value="${m}" onchange="appS.page.month=this.value;renderApp()"/></div>
    <div class="card" style="background:linear-gradient(135deg,var(--espresso),var(--mocha));color:white;padding:22px;margin-bottom:14px">
      <div style="font-size:13px;opacity:.85;margin-bottom:4px">${m} 營業額</div>
      <div style="font-size:36px;font-weight:700">${fm(mRev)}</div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <div style="padding:5px 12px;background:rgba(255,255,255,.18);border-radius:10px;font-size:12px">毛利 ${fm(mProfit)}</div>
        <div style="padding:5px 12px;background:rgba(255,255,255,.18);border-radius:10px;font-size:12px">毛利率 ${pct(mMg)}</div>
        <div style="padding:5px 12px;background:rgba(255,255,255,.18);border-radius:10px;font-size:12px">${mTx.length} 筆</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
      <div class="card" style="text-align:center;padding:14px;margin:0"><div style="font-size:11px;color:var(--muted)">VIP</div><div style="font-size:20px;font-weight:700;color:#8B3A2E;margin-top:4px">${vip}</div></div>
      <div class="card" style="text-align:center;padding:14px;margin:0"><div style="font-size:11px;color:var(--muted)">舊客</div><div style="font-size:20px;font-weight:700;color:#7A5A1F;margin-top:4px">${old}</div></div>
      <div class="card" style="text-align:center;padding:14px;margin:0"><div style="font-size:11px;color:var(--muted)">新客</div><div style="font-size:20px;font-weight:700;color:var(--mocha);margin-top:4px">${nw}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px">本月新客 vs 回流客</div>
      <div style="display:flex;gap:14px;align-items:center;margin-top:12px">
        <div style="flex:1"><div style="font-size:12px;color:var(--muted)">新客</div><div style="font-size:28px;font-weight:700;color:var(--success)">${newIn}</div></div>
        <div style="width:1px;background:var(--border);height:50px"></div>
        <div style="flex:1"><div style="font-size:12px;color:var(--muted)">回流客</div><div style="font-size:28px;font-weight:700;color:var(--caramel)">${retIn}</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:16px">近 7 日營業額</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:120px">
        ${days7.map(d=>{const h=d.rev/maxRev*100;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="font-size:9px;color:var(--muted);height:12px">${d.rev>0?`${(d.rev/1000).toFixed(1)}k`:''}</div><div style="width:100%;height:${Math.max(h,4)}%;border-radius:6px;background:${d.ds===today()?'linear-gradient(180deg,var(--caramel),var(--mocha))':'var(--latte)'}"></div><div style="font-size:10px;color:var(--muted)">${d.lbl}</div></div>`}).join('')}
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px">付款方式分布</div>
      ${Object.entries(pmMap).map(([pm,rev])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--ink);font-weight:600">${pm}</span><div style="text-align:right"><div style="font-weight:700;color:var(--caramel)">${fm(rev)}</div><div style="font-size:11px;color:var(--muted)">${pct(mRev>0?rev/mRev*100:0)}</div></div></div>`).join('')||`<div style="text-align:center;color:var(--muted);padding:16px">本月暫無資料</div>`}
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:14px;font-weight:700;color:var(--ink)">療程毛利排行 TOP 5</div></div>
      ${top5.length===0?`<div style="text-align:center;color:var(--muted);padding:16px">本月暫無資料</div>`
      :top5.map((s,i)=>{const mg=s.rev>0?s.profit/s.rev*100:0;return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:${i<top5.length-1?'1px solid var(--border)':'none'}"><div style="width:32px;height:32px;border-radius:12px;background:${i===0?'var(--gold)':'var(--milk)'};color:${i===0?'white':'var(--mocha)'};display:grid;place-items:center;font-weight:700">${i+1}</div><div style="flex:1"><div style="font-weight:600;color:var(--ink)">${esc(s.name)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${s.count}次 · 營收 ${fm(s.rev)} · <span class="${mgCls(mg)}">${pct(mg)}</span></div></div><div style="font-weight:700;color:var(--caramel)">${fm(s.profit)}</div></div>`}).join('')}
    </div>
  </div>`;
}

  const daysMap={};mTx.forEach(t=>{const d=parseInt(t.date.slice(8));if(!daysMap[d])daysMap[d]={day:d,rev:0};daysMap[d].rev+=t.paid});

          <div style="display:flex;align-items:flex-end;gap:6px;height:160px;overflow-x:auto" class="no-scrollbar">
            ${dailyData.map(d=>{const h=d.rev/maxRev*100;const isToday=`${vm}-${String(d.day).padStart(2,'0')}`===today();return`<div style="flex:0 0 28px;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="font-size:9px;color:var(--muted);height:12px">${d.rev>0?`${(d.rev/1000).toFixed(1)}k`:''}</div><div style="width:20px;height:${Math.max(h,4)}%;border-radius:4px;background:${isToday?'linear-gradient(180deg,var(--caramel),var(--mocha))':'var(--latte)'}"></div><div style="font-size:9px;color:var(--muted)">${d.day}</div></div>`}).join('')}

  </div>`;

      <div class="admin-btn-group">${['新客','舊客','VIP'].map(l=>`<button class="admin-btn-option tap btn-sm ${(f.level||'')===l?'selected':''}" onclick="adminS.subPage.form={...adminS.subPage.form,level:'${l}'};renderAdmin()">${l}</button>`).join('')}</div>
    </div>
    <div class="field"><div class="field-label">備註</div><textarea class="admin-input" style="min-height:80px;resize:none" oninput="adminS.subPage.form={...adminS.subPage.form,notes:this.value}">${esc(f.notes||'')}</textarea></div>
    <div style="display:flex;gap:12px">
      <button class="btn-secondary tap" onclick="goAdmin('customers')">取消</button>
      <button class="btn-primary tap" onclick="aSaveCustomer()">儲存</button>
    </div>
  </div></div>`;
}
window.aSaveCustomer=()=>{
  const f=adminS.subPage?.form||adminS.subPage?.editing;
  if(!f?.name){toast('請填姓名');return}
  const existing=D.customers.find(c=>c.id===f.id);
  const cust={id:f.id||uid(),name:f.name,phone:f.phone||'',lineId:f.lineId||'',birthday:f.birthday||'',skinType:f.skinType||'',level:f.level||'新客',notes:f.notes||'',totalSpent:existing?.totalSpent||0,visits:existing?.visits||0,lastVisit:existing?.lastVisit||''};
  const idx=D.customers.findIndex(c=>c.id===cust.id);
  if(idx>=0)D.customers[idx]=cust;else D.customers=[...D.customers,cust];
  persist();toast('✅ 客戶已儲存');goAdmin('customers');
};
window.aDelCustomer=id=>showAdminModal({type:'confirm',danger:true,title:'刪除客戶',msg:'確定刪除？此操作不可復原',onConfirm:()=>{D.customers=D.customers.filter(c=>c.id!==id);persist();toast('已刪除');closeAdminModal();goAdmin('customers')}});

/* ─── 後台療程管理 ─── */
function aPageServices(){
  if(adminS.subPage?.editing!==undefined)return aPageServiceEdit();
  const cat=adminS.subPage?.cat||'全部';
  const svcs=D.services.filter(s=>cat==='全部'||s.category===cat);
  return `${adminTopbar('療程管理',`<button class="btn-primary tap btn-sm" onclick="goAdmin('services',{editing:{id:uid(),name:'',price:'',cost:'',category:'臉部',active:true,isNew:true}})">${Iadmin.plus} 新增療程</button>`)}
  <div class="content anim-fade">
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      ${['全部','臉部','身體','其他'].map(c=>`<button class="admin-btn-option tap btn-sm ${cat===c?'selected':''}" onclick="goAdmin('services',{cat:'${c}'})">${c}</button>`).join('')}
    </div>
    <div class="table-wrap"><div class="tbl-scroll"><table>
      <thead><tr><th>療程名稱</th><th>分類</th><th>售價</th><th>成本</th><th>毛利</th><th>毛利率</th><th>狀態</th><th>操作</th></tr></thead>
      <tbody>${svcs.map(s=>{const profit=s.price-s.cost,mg=s.price>0?profit/s.price*100:0;return`<tr>
        <td style="font-weight:700">${esc(s.name)}</td>
        <td><span class="admin-tag">${s.category}</span></td>
        <td style="font-weight:700">${fm(s.price)}</td>
        <td style="color:var(--muted)">${fm(s.cost)}</td>
        <td style="color:var(--caramel);font-weight:700">${fm(profit)}</td>
        <td><span class="${marginCls(mg)}">${pct(mg)}</span></td>
        <td><span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:${s.active?'var(--sage)':'var(--border)'};color:${s.active?'#2D5A2D':'var(--muted)'}">${s.active?'啟用':'停用'}</span></td>
        <td><button class="btn-secondary tap btn-sm" onclick="adminEditSvc('${s.id}')">${Iadmin.edit}</button></td>
      </tr>`}).join('')}</tbody>
    </table></div></div>
  </div>`;
}
function aPageServiceEdit(){
  const e=adminS.subPage.editing;
  const price=parseFloat(e.price)||0,cost=parseFloat(e.cost)||0;
  const profit=price-cost,mg=price>0?profit/price*100:0;
  return `${adminTopbar(e.isNew?'新增療程':'編輯療程')}
  <div class="content anim-fade"><div class="form-card">
    <div class="field"><div class="field-label">療程名稱 *</div><input class="admin-input" value="${esc(e.name)}" oninput="adminS.subPage.editing.name=this.value;renderAdmin()"/></div>
    <div class="field"><div class="field-label">分類</div>
      <div class="admin-btn-group">${['臉部','身體','其他'].map(c=>`<button class="admin-btn-option tap btn-sm ${e.category===c?'selected':''}" onclick="adminS.subPage.editing.category='${c}';renderAdmin()">${c}</button>`).join('')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="field"><div class="field-label">售價 *</div><input class="admin-input" type="number" value="${e.price}" oninput="adminS.subPage.editing.price=this.value;renderAdmin()"/></div>
      <div class="field"><div class="field-label">成本</div><input class="admin-input" type="number" value="${e.cost}" oninput="adminS.subPage.editing.cost=this.value;renderAdmin()"/></div>
    </div>
    ${price>0?`<div style="background:linear-gradient(135deg,var(--caramel),var(--mocha));color:white;border-radius:16px;padding:20px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center"><div><div style="font-size:11px;opacity:.85">毛利</div><div style="font-size:24px;font-weight:800">${fm(profit)}</div></div><div><div style="font-size:11px;opacity:.85">毛利率</div><div style="font-size:24px;font-weight:800">${pct(mg)}</div></div></div>`:''}
    <div class="field"><div class="field-label">狀態</div>
      <div class="admin-btn-group">
        <button class="admin-btn-option tap btn-sm ${e.active?'selected':''}" onclick="adminS.subPage.editing.active=true;renderAdmin()">✅ 啟用</button>
        <button class="admin-btn-option tap btn-sm ${!e.active?'selected':''}" onclick="adminS.subPage.editing.active=false;renderAdmin()">⏸ 停用</button>
      </div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn-secondary tap" onclick="goAdmin('services')">取消</button>
      <button class="btn-primary tap" onclick="aSaveService()">儲存</button>
    </div>
  </div></div>`;
}
window.aSaveService=()=>{
  const e=adminS.subPage.editing;
  if(!e.name||!e.price){toast('請填名稱和售價');return}
  const svc={id:e.id,name:e.name,price:parseInt(e.price),cost:parseInt(e.cost)||0,category:e.category,active:e.active};
  const idx=D.services.findIndex(s=>s.id===svc.id);
  if(idx>=0)D.services[idx]=svc;else D.services=[...D.services,svc];
  persist();toast('✅ 療程已儲存');goAdmin('services');
};

/* ─── 後台儲值錢包 ─── */
function aPageWallets(){
  const bals=D.customers.map(c=>({customer:c,balance:walletBal(c.id),entries:D.wallets.filter(w=>w.cid===c.id)})).filter(b=>b.entries.length>0).sort((a,b)=>b.balance-a.balance);
  const totalBal=bals.reduce((s,b)=>s+b.balance,0);
  return `${adminTopbar('儲值錢包',`<button class="btn-primary tap btn-sm" onclick="goAdmin('wallets',{addWallet:true})">${Iadmin.plus} 新增儲值</button>`)}
  <div class="content anim-fade">
    ${adminS.subPage?.addWallet?aRenderAddWallet():''}
    <div class="kpi-grid" style="margin-bottom:24px">
      <div class="kpi-card kpi-card-dark"><div class="kpi-label">總儲值餘額（負債）</div><div class="kpi-value">${fm(totalBal)}</div><div class="kpi-sub">${bals.length} 位儲值客戶</div></div>
    </div>
    <div class="table-wrap" style="margin-bottom:24px"><div class="tbl-scroll"><table>
      <thead><tr><th>客戶</th><th>等級</th><th>餘額</th><th>筆數</th><th>最後操作</th><th>操作</th></tr></thead>
      <tbody>${bals.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">還沒有儲值客戶</td></tr>`:
      bals.map(b=>{const last=b.entries.sort((a,c)=>c.date.localeCompare(a.date))[0];return`<tr>
        <td style="font-weight:700">${esc(b.customer.name)}</td>
        <td><span class="admin-tag admin-tag-${b.customer.level==='VIP'?'vip':b.customer.level==='舊客'?'old':'new'}">${b.customer.level}</span></td>
        <td style="font-weight:800;color:#5C4B7C">${fm(b.balance)}</td>
        <td>${b.entries.length}</td>
        <td>${last?.date||'-'} ${last?.type?`(${last.type})`:''}</td>
        <td><button class="btn-primary tap btn-sm" onclick="goAdmin('wallets',{addWallet:true,preCustomer:'${b.customer.id}'})">+ 儲值</button></td>
      </tr>`}).join('')}</tbody>
    </table></div></div>
    <div class="table-wrap">
      <div class="table-head"><h2>儲值流水帳</h2></div>
      <div class="tbl-scroll"><table>
        <thead><tr><th>日期</th><th>客戶</th><th>類型</th><th>金額</th><th>備註</th></tr></thead>
        <tbody>${D.wallets.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,50).map(w=>`<tr>
          <td>${w.date}</td>
          <td style="font-weight:600">${esc(w.cname)}</td>
          <td>${w.type}</td>
          <td style="font-weight:700;color:${(w.sign||0)>=0?'var(--success)':'var(--danger)'}">${(w.sign||0)>=0?'+':''}${fm(w.sign||0)}</td>
          <td style="color:var(--muted)">${esc(w.note||'-')}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  </div>`;
}
function aRenderAddWallet(){
  const preCust=adminS.subPage?.preCustomer||'';
  return `<div class="form-card" style="margin-bottom:24px">
    <div style="font-size:18px;font-weight:700;margin-bottom:20px">新增儲值記錄</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="field"><div class="field-label">客戶 *</div>
        <select class="admin-input" id="wc">
          <option value="">選擇客戶…</option>
          ${D.customers.map(c=>`<option value="${c.id}" ${preCust===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><div class="field-label">類型</div>
        <select class="admin-input" id="wt">${['儲值','贈送','退款'].map(t=>`<option>${t}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><div class="field-label">金額 *</div><input class="admin-input" id="wa" type="number" placeholder="10000"/></div>
    <div class="field"><div class="field-label">備註</div><input class="admin-input" id="wn" placeholder="首次儲值送 10%…"/></div>
    <div style="display:flex;gap:12px">
      <button class="btn-secondary tap" onclick="goAdmin('wallets')">取消</button>
      <button class="btn-primary tap" onclick="aSaveWallet()">確認儲值</button>
    </div>
  </div>`;
}
window.aSaveWallet=()=>{
  const cid=document.getElementById('wc')?.value;
  const type=document.getElementById('wt')?.value||'儲值';
  const amount=parseInt(document.getElementById('wa')?.value||0);
  const note=document.getElementById('wn')?.value||'';
  if(!cid||!amount){toast('請選客戶並填金額');return}
  const cust=D.customers.find(c=>c.id===cid);
  D.wallets=[{id:uid(),cid,cname:cust.name,type,amount,sign:amount,date:today(),note,staff:D.user.name},...D.wallets];
  persist();toast('✅ 儲值成功');goAdmin('wallets');
};

/* ─── 後台員工管理 ─── */
function aPageStaff(){
  const mn=thisMonth();
  const mTx=D.transactions.filter(t=>t.date.startsWith(mn)&&t.status==='完成');
  const staffStats=D.staff.map(s=>{const txs=mTx.filter(t=>t.staff===s.name);return{...s,monthRev:txs.reduce((a,t)=>a+t.paid,0),monthCount:txs.length}});
  return `${adminTopbar('員工管理',`<button class="btn-primary tap btn-sm" onclick="goAdmin('staff',{addStaff:true})">${Iadmin.plus} 新增員工</button>`)}
  <div class="content anim-fade">
    ${adminS.subPage?.addStaff?`<div class="form-card" style="margin-bottom:24px">
      <div style="font-size:18px;font-weight:700;margin-bottom:20px">新增員工</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="field"><div class="field-label">姓名 *</div><input class="admin-input" id="sname" placeholder="Amy"/></div>
        <div class="field"><div class="field-label">角色</div><select class="admin-input" id="srole">${['員工','老闆'].map(r=>`<option>${r}</option>`).join('')}</select></div>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn-secondary tap" onclick="goAdmin('staff')">取消</button>
        <button class="btn-primary tap" onclick="aAddStaff()">新增</button>
      </div>
    </div>`:''}
    <div class="table-wrap"><div class="tbl-scroll"><table>
      <thead><tr><th>姓名</th><th>角色</th><th>狀態</th><th>本月筆數</th><th>本月業績</th><th>操作</th></tr></thead>
      <tbody>${staffStats.map(s=>`<tr>
        <td style="font-weight:700">${esc(s.name)}</td>
        <td>${s.role}</td>
        <td><span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:${s.active!==false?'var(--sage)':'var(--border)'};color:${s.active!==false?'#2D5A2D':'var(--muted)'}">${s.active!==false?'在職':'離職'}</span></td>
        <td>${s.monthCount} 筆</td>
        <td style="font-weight:700;color:var(--caramel)">${fm(s.monthRev)}</td>
        <td><button class="btn-danger tap btn-sm" onclick="aToggleStaff('${s.id}')">${s.active!==false?'停用':'啟用'}</button></td>
      </tr>`).join('')}</tbody>
    </table></div></div>
  </div>`;
}
window.aAddStaff=()=>{
  const name=document.getElementById('sname')?.value.trim();
  const role=document.getElementById('srole')?.value||'員工';
  if(!name){toast('請輸入姓名');return}
  D.staff=[...D.staff,{id:uid(),name,role,active:true,joinDate:today()}];
  persist();toast('✅ 員工已新增');goAdmin('staff');
};
window.aToggleStaff=id=>{const idx=D.staff.findIndex(s=>s.id===id);if(idx>=0){D.staff[idx].active=!D.staff[idx].active;persist();renderAdmin()}};

/* ─── 後台系統設定 ─── */
function aPageSettings(){
  const totalSize=JSON.stringify({c:D.customers,s:D.services,t:D.transactions,a:D.appointments,w:D.wallets}).length;
  return `${adminTopbar('系統設定')}
  <div class="content anim-fade">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="table-wrap" style="padding:28px">
        <div style="font-size:18px;font-weight:700;margin-bottom:20px">資料備份</div>
        <div style="margin-bottom:20px;padding:16px;background:var(--milk);border-radius:14px">
          <div style="font-size:13px;color:var(--muted);margin-bottom:4px">目前資料量</div>
          <div style="font-size:16px;font-weight:700">${D.customers.length} 客戶 · ${D.services.length} 療程 · ${D.transactions.length} 交易</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">約 ${(totalSize/1024).toFixed(1)} KB</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn-primary tap" onclick="backupAll()">📥 下載完整備份 (JSON)</button>
          <button class="btn-secondary tap" onclick="exportCSV('transactions')">📊 匯出交易紀錄 (CSV)</button>
          <button class="btn-secondary tap" onclick="exportCSV('customers')">👥 匯出客戶資料 (CSV)</button>
          <button class="btn-secondary tap" onclick="exportCSV('services')">✨ 匯出療程資料 (CSV)</button>
        </div>
      </div>
      <div class="table-wrap" style="padding:28px">
        <div style="font-size:18px;font-weight:700;margin-bottom:20px">系統資訊</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${[{l:'版本',v:'整合版 v3.0'},
             {l:'資料儲存',v:'本機 localStorage'},
             {l:'毛利計算',v:'實收 - 成本（快照）'},
             {l:'等級規則',v:'VIP≥$30,000 / 舊客≥$3,000'},
             {l:'未到訪警示',v:'30天橘色 / 60天紅色'},
          ].map(r=>`<div style="display:flex;justify-content:space-between;padding:12px;background:var(--milk);border-radius:10px"><span style="font-size:13px;color:var(--muted)">${r.l}</span><span style="font-size:13px;font-weight:600">${r.v}</span></div>`).join('')}
        </div>
      </div>
      <div class="table-wrap" style="padding:28px;border:1.5px solid #FEE2E2">
        <div style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--danger)">⚠️ 危險操作</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px">以下操作不可復原，請先備份資料</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn-danger tap" onclick="aClearData('transactions')">清除所有交易紀錄</button>
          <button class="btn-danger tap" onclick="aClearData('all')">清除所有資料（恢復預設）</button>
        </div>
      </div>
    </div>
  </div>`;
}
window.aClearData=type=>showAdminModal({type:'confirm',danger:true,title:'確認清除',msg:type==='all'?'確定要清除所有資料並恢復預設？此操作不可復原！':'確定要清除所有交易紀錄？',
  onConfirm:()=>{
    if(type==='all'){D.customers=[...SEED_CU];D.services=[...SEED_SVC];D.transactions=[...SEED_TX];D.appointments=[];D.wallets=[...SEED_WL]}
    else if(type==='transactions')D.transactions=[];
    persist();toast('已清除');closeAdminModal();goAdmin('dashboard');
  }
});

/* ════════════════════════════════════
   初始化
════════════════════════════════════ */
(function init(){
  try{
    if(D.user){
      if(D.user.role==='admin')showAdmin();
      else showApp();
    }else{
      document.getElementById('login-view').style.display='flex';
    }
  }catch(e){
    console.error('Init error:',e);
    document.getElementById('login-view').style.display='flex';
  }
})();
</script>
</body>
